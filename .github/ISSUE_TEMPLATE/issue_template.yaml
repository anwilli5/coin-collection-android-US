---
name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior"
title: "Bug: "
labels:
  - "bug"
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Your contribution helps us improve.
        Please search [existing issues](https://github.com/anwilli5/coin-collection-android-US/issues) before filing a new one to avoid duplicates.

        We are also happy to accept contributions from our users. For more details see [here](https://github.com/anwilli5/coin-collection-android-US/blob/main/CONTRIBUTING.md).
  - type: textarea
    id: bug-description
    validations:
      required: true
    attributes:
      label: "🐛 Description"
      description: "A clear and concise description of the bug."
  - type: textarea
    id: steps-to-reproduce
    validations:
      required: true
    attributes:
      label: "📋 Steps to Reproduce"
      description: "List the steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
  - type: textarea
    id: expected-behavior
    validations:
      required: true
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen?"
  - type: textarea
    id: actual-behavior
    validations:
      required: true
    attributes:
      label: "❌ Actual Behavior"
      description: "What actually happened?"
  - type: textarea
    id: screenshots
    validations:
      required: false
    attributes:
      label: "📸 Screenshots"
      description: "If applicable, add screenshots to help explain the problem."
  - type: input
    id: app-version
    validations:
      required: false
    attributes:
      label: "App Version"
      description: "What version of the app are you using?"
      placeholder: "e.g., 5.0.0"
  - type: input
    id: android-version
    validations:
      required: false
    attributes:
      label: "Android Version"
      description: "What version of Android are you running?"
      placeholder: "e.g., Android 14"
